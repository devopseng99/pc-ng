apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: paperclipbuilds.paperclip.istayintek.com
spec:
  group: paperclip.istayintek.com
  names:
    kind: PaperclipBuild
    listKind: PaperclipBuildList
    plural: paperclipbuilds
    singular: paperclipbuild
    shortNames:
      - pb
    categories:
      - paperclip
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: PIPELINE
          type: string
          jsonPath: .spec.pipeline
          description: Pipeline tenant (v1, tech, wasm, soa, ecom, etc.)
        - name: PHASE
          type: string
          jsonPath: .status.phase
          description: Current build phase
        - name: APP
          type: string
          jsonPath: .spec.appName
          description: Human-readable app name
        - name: INSTANCE
          type: string
          jsonPath: .spec.targetInstance
          description: Target Paperclip instance
        - name: CATEGORY
          type: string
          jsonPath: .spec.category
          description: Build category
        - name: URL
          type: string
          jsonPath: .status.deployUrl
          description: Deployment URL
          priority: 1
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
          description: Time since creation
      schema:
        openAPIV3Schema:
          type: object
          description: PaperclipBuild represents a single application build and deployment lifecycle.
          properties:
            spec:
              type: object
              description: Desired state of the PaperclipBuild.
              required:
                - appId
                - appName
                - prefix
                - pipeline
                - repo
                - targetInstance
                - targetNamespace
              properties:
                appId:
                  type: integer
                  description: Unique numeric identifier for the application.
                appName:
                  type: string
                  description: Human-readable application name.
                prefix:
                  type: string
                  description: Short prefix code used in naming conventions.
                category:
                  type: string
                  description: Build category for grouping related applications.
                pipeline:
                  type: string
                  description: Which pipeline tenant this build belongs to. Valid pipelines are registered in the pipeline-registry ConfigMap.
                  pattern: "^[a-z][a-z0-9-]{0,29}$"
                targetInstance:
                  type: string
                  description: Target Paperclip instance name (e.g. pc, pc-v2, pc-v4).
                targetNamespace:
                  type: string
                  description: K8s namespace of the target Paperclip instance (e.g. paperclip, paperclip-v4).
                repo:
                  type: string
                  description: GitHub repository name.
                priority:
                  type: integer
                  description: Queue priority (1=highest, 10=lowest).
                  default: 5
                  minimum: 1
                  maximum: 10
                framework:
                  type: string
                  description: Detected build framework.
                  enum:
                    - next
                    - astro
                    - turbo-next
                    - turbo-astro
                    - unknown
                deployTarget:
                  type: string
                  description: Where the app is deployed.
                  enum:
                    - nginx
                    - cf-pages
                    - k8s-pod
                    - multi
                hosting:
                  type: string
                  description: Hosting platform for the deployed app.
                  enum:
                    - static-sites
                    - cloudflare
                    - paperclip-ns
                    - multi
                platform:
                  type: string
                  description: Runtime platform.
                  enum:
                    - static
                    - node
                    - wasm
                    - worker
            status:
              type: object
              description: Observed state of the PaperclipBuild, managed by the controller.
              properties:
                phase:
                  type: string
                  description: Current phase of the build lifecycle.
                  enum:
                    - Pending
                    - Queued
                    - Onboarding
                    - Building
                    - Deploying
                    - Deployed
                    - Failed
                companyId:
                  type: string
                  description: Paperclip company ID after successful onboarding.
                deployUrl:
                  type: string
                  description: URL where the application is deployed.
                errorMessage:
                  type: string
                  description: Error details if the build has failed.
                startedAt:
                  type: string
                  format: date-time
                  description: Timestamp when the build started.
                completedAt:
                  type: string
                  format: date-time
                  description: Timestamp when the build completed or failed.
                deployTargets:
                  type: array
                  description: All locations where this app is deployed, with active/disabled state.
                  items:
                    type: object
                    properties:
                      target:
                        type: string
                        description: Deploy target name (nginx, cf-pages, k8s-pod).
                      state:
                        type: string
                        description: Whether this deploy target is active or disabled.
                        enum:
                          - active
                          - disabled
                      url:
                        type: string
                        description: URL for this deploy target.
                      lastDeployed:
                        type: string
                        description: Timestamp of last deploy to this target.
                checkpoints:
                  type: array
                  description: Ordered list of pipeline stage checkpoints.
                  items:
                    type: object
                    properties:
                      stage:
                        type: string
                        description: Name of the pipeline stage.
                      status:
                        type: string
                        description: Current status of this stage.
                        enum:
                          - pending
                          - running
                          - complete
                          - failed
                      completedAt:
                        type: string
                        description: Timestamp when this stage completed.

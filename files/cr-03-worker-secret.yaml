# cr-03 — Worker with secret-provisioner hook
apiVersion: agentintake.istayintek.com/v1alpha1
kind: AgentIntake
metadata:
  name: test-worker-secret
  namespace: agent-intake
spec:
  appName: test-worker-secret
  buildType: worker
  specRef: "specs/test-worker-secret.yaml"
  repoUrl: https://github.com/devopseng99/test-worker-secret
  hooks:
    - phase: pre-build
      plugin: secret-provisioner
      config:
        secrets:
          - name: API_KEY
            valueFrom: test-api-secret
